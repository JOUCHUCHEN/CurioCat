        // 動物部位座標校準 (嚴格保留前一版本位置，適配新卡片高度)
        const baseAnimals = [

            ]},

            ]},
            { word: 'snake', emoji: '🐍', parts: [
                { id: 'tongues', top: '15%', left: '12%' },
                { id: 'tails', top: '82%', left: '60%' }, 
                { id: 'bodies', top: '45%', left: '45%' }  
            ]},
            { word: 'human', emoji: '🧑', parts: [
                { id: 'eyes', top: '22%', left: '60%' },
                { id: 'noses', top: '48%', left: '72%' },
                { id: 'ears', top: '42%', left: '22%' }
            ]},
            { word: 'crow', icon: 'https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/svg/1f426-200d-2b1b.svg', parts: [ 
                { id: 'claws', top: '85%', left: '45%' }, 
                { id: 'wings', top: '42%', left: '55%' },
                { id: 'mouths', top: '35%', left: '15%' }
            ]},
            { word: 'eagle', emoji: '🦅', parts: [
                { id: 'claws', top: '88%', left: '35%' }, 
                { id: 'wings', top: '28%', left: '58%' },
                { id: 'eyes', top: '28%', left: '18%' }
            ]},
            { word: 'whale', emoji: '🐋', parts: [
                { id: 'tails', top: '35%', left: '78%' }, 
                { id: 'heads', top: '48%', left: '18%' },
                { id: 'fins', top: '75%', left: '45%' }  
            ]},
            { word: 'seal', icon: 'https://raw.githubusercontent.com/googlefonts/noto-emoji/main/svg/emoji_u1f9ad.svg', parts: [
                { id: 'bodies', top: '65%', left: '62%' },
                { id: 'tails', top: '80%', left: '80%' }, 
                { id: 'heads', top: '25%', left: '25%' }
            ]}
        ];

        const apiKey = ""; 
        let currentAudio = null;
        let safeTimeoutId = null;
        const audioCache = {};
        const fetchPromises = {};

        const preloadAudio = async (url) => {
            if (audioCache[url]) return audioCache[url];
            if (fetchPromises[url]) return fetchPromises[url];
            fetchPromises[url] = fetch(url).then(res => res.ok ? res.blob() : Promise.reject())
                .then(blob => {
                    const audio = new Audio(URL.createObjectURL(new Blob([blob], { type: 'audio/mpeg' })));
                    audio.preload = 'auto'; audioCache[url] = audio; return audio;
                }).catch(() => { const audio = new Audio(url); audioCache[url] = audio; return audio; });
            return fetchPromises[url];
        };

        const playAudioFromPCM = (base64Data, sampleRate) => {
            return new Promise((resolve, reject) => {
                try {
                    if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
                    const binaryString = atob(base64Data); const len = binaryString.length;
                    const bytes = new Uint8Array(len); for (let i = 0; i < len; i++) bytes[i] = binaryString.charCodeAt(i);
                    const wavHeader = new ArrayBuffer(44); const view = new DataView(wavHeader);
                    view.setUint32(0, 0x52494646, false); view.setUint32(4, 36 + len, true);
                    view.setUint32(8, 0x57415645, false); view.setUint32(12, 0x666d7420, false); 
                    view.setUint16(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, 1, true); 
                    view.setUint32(24, sampleRate, true); view.setUint32(28, sampleRate * 2, true);
                    view.setUint16(32, 2, true); view.setUint16(34, 16, true);
                    view.setUint32(36, 0x64617461, false); view.setUint32(40, len, true);
                    currentAudio = new Audio(URL.createObjectURL(new Blob([wavHeader, bytes], { type: 'audio/wav' })));
                    currentAudio.playbackRate = 0.75; currentAudio.onended = resolve; currentAudio.onerror = reject;
                    currentAudio.play().catch(reject);
                } catch (e) { reject(e); }
            });
        };

        const speakWithBackoff = async (text, setIsLoading) => {
            if (!text) return; if ('speechSynthesis' in window) window.speechSynthesis.cancel();
            if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
            if (setIsLoading) setIsLoading(true);
            const cleanup = () => { if (setIsLoading) setIsLoading(false); };
            
            const delays = [1000, 2000, 4000, 8000, 16000];
            let success = false;

            for (let i = 0; i <= delays.length; i++) {
                try {
                    if (apiKey) {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents: [{ parts: [{ text: text }] }], generationConfig: { responseModalalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } } } })
                        });
                        if (response.ok) {
                            const result = await response.json(); const pcmData = result.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
                            if (pcmData) {
                                const sampleRate = parseInt(result.candidates[0].content.parts[0].inlineData.mimeType.split('rate=')[1]) || 24000;
                                await playAudioFromPCM(pcmData, sampleRate);
                                success = true;
                                break;
                            }
                        }
                    }
                } catch (e) {}
                if (i < delays.length) await new Promise(r => setTimeout(r, delays[i]));
            }

            if (!success && 'speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text); utterance.lang = 'en-US'; utterance.rate = 0.75;
                utterance.onend = cleanup; utterance.onerror = cleanup;
                window.speechSynthesis.speak(utterance);
            } else { cleanup(); }
        };

        const playExternalAudio = async (url, fallbackText = null) => {
            if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
            if ('speechSynthesis' in window) window.speechSynthesis.cancel();
            try {
                let audio = audioCache[url] || await preloadAudio(url);
                currentAudio = audio; currentAudio.currentTime = 0; await currentAudio.play();
            } catch (e) { if (fallbackText) speakWithBackoff(fallbackText); }
        };

        const PhonicsWord = ({ word, firstLetterColor = "text-orange-500", restColor = "text-emerald-700", phonicsUrl = null, wordUrl = null, capitalize = false, setIsSpeaking }) => {
            const first = word.charAt(0); const rest = word.slice(1);
            return (
                <div className="flex items-center gap-1 justify-center">
                    <div className="font-black text-3xl md:text-5xl flex items-baseline leading-none">
                        <button onClick={(e) => { e.stopPropagation(); if (phonicsUrl) playExternalAudio(phonicsUrl, first); else speakWithBackoff(first, setIsSpeaking); }} className={`${firstLetterColor} hover:scale-125 transition-transform`}>{capitalize ? first.toUpperCase() : first}</button>
                        <span onClick={(e) => { e.stopPropagation(); if (wordUrl) playExternalAudio(wordUrl, word); else speakWithBackoff(word, setIsSpeaking); }} className={`${restColor} cursor-pointer hover:opacity-80`}>{rest}</span>
                    </div>
                    <button onClick={(e) => { e.stopPropagation(); if (wordUrl) playExternalAudio(wordUrl, word); else speakWithBackoff(word, setIsSpeaking); }} className="text-slate-400 hover:text-indigo-600 p-1 bg-slate-50 rounded-full ml-3"><Volume2 size={20} /></button>
                </div>
            );
        };

        function App() {
            const [activeTab, setActiveTab] = useState('animals');
            const [toastMsg, setToastMsg] = useState("");
            const [isSpeaking, setIsSpeaking] = useState(false);
            const [grammarSentence, setGrammarSentence] = useState(null);
            const [gameScore, setGameScore] = useState(0);
            const [hasStartedGame, setHasStartedGame] = useState(false);
            const [targetBeast, setTargetBeast] = useState(null);
            const [options, setOptions] = useState([]);
            const [gameMode, setGameMode] = useState('challenge');
            
            const videoRef = useRef(null);
            const cursorRef = useRef(null);
            const progressRef = useRef(null);
            const gameState = useRef({ active: false });
            const hoverState = useRef({ node: null, startTime: 0 });
            const handsModelRef = useRef(null);
            const cameraRef = useRef(null);

            const customAudioMap = {
                'dog': { phonicUrl: 'https://raw.githubusercontent.com/JOUCHUCHEN/maachiiknow/main/Sound/D/phonic-d.mp3', wordUrl: 'https://raw.githubusercontent.com/JOUCHUCHEN/maachiiknow/main/Sound/D/vocabulary-dog.mp3', firstLetterColor: 'text-pink-600' },
                'horse': { phonicUrl: 'https://raw.githubusercontent.com/JOUCHUCHEN/maachiiknow/main/Sound/H/phonic-h.mp3', wordUrl: 'https://raw.githubusercontent.com/JOUCHUCHEN/maachiiknow/main/Sound/H/vocabulary-horse.mp3', firstLetterColor: 'text-orange-500' },
                'elephant': { phonicUrl: 'https://raw.githubusercontent.com/JOUCHUCHEN/maachiiknow/main/Sound/E/phonic-e.mp3', wordUrl: 'https://raw.githubusercontent.com/JOUCHUCHEN/maachiiknow/main/Sound/E/vocabulary-elephant.mp3', firstLetterColor: 'text-indigo-500' },
                'lion': { phonicUrl: 'https://raw.githubusercontent.com/JOUCHUCHEN/maachiiknow/main/Sound/L/phonic-l.mp3', wordUrl: 'https://raw.githubusercontent.com/JOUCHUCHEN/maachiiknow/main/Sound/L/vocabulary-lion.mp3', firstLetterColor: 'text-amber-600' },
                'snake': { phonicUrl: 'https://raw.githubusercontent.com/JOUCHUCHEN/maachiiknow/main/Sound/S/phonic-s.mp3', wordUrl: 'https://raw.githubusercontent.com/JOUCHUCHEN/maachiiknow/main/Sound/S/vocabulary-snake.mp3', firstLetterColor: 'text-green-600' },
                'human': { phonicUrl: 'https://raw.githubusercontent.com/JOUCHUCHEN/maachiiknow/main/Sound/H/phonic-h.mp3', wordUrl: 'https://raw.githubusercontent.com/JOUCHUCHEN/maachiiknow/main/Sound/H/vocabulary-human.mp3', firstLetterColor: 'text-rose-500' },
                'crow': { phonicUrl: 'https://raw.githubusercontent.com/JOUCHUCHEN/maachiiknow/main/Sound/C/phonic-c.mp3', wordUrl: 'https://raw.githubusercontent.com/JOUCHUCHEN/maachiiknow/main/Sound/C/vocabulary-crow.mp3', firstLetterColor: 'text-slate-800' },
                'eagle': { phonicUrl: 'https://raw.githubusercontent.com/JOUCHUCHEN/maachiiknow/main/Sound/E/phonic-e.mp3', wordUrl: 'https://raw.githubusercontent.com/JOUCHUCHEN/maachiiknow/main/Sound/E/vocabulary-eagle.mp3', firstLetterColor: 'text-yellow-600' },
                'whale': { phonicUrl: 'https://raw.githubusercontent.com/JOUCHUCHEN/maachiiknow/main/Sound/W/phonic-wh.mp3', wordUrl: 'https://raw.githubusercontent.com/JOUCHUCHEN/maachiiknow/main/Sound/W/vocabulary-whale_2.mp3', firstLetterColor: 'text-blue-600' },
                'seal': { phonicUrl: 'https://raw.githubusercontent.com/JOUCHUCHEN/maachiiknow/main/Sound/S/phonic-s.mp3', wordUrl: 'https://raw.githubusercontent.com/JOUCHUCHEN/maachiiknow/main/Sound/S/vocabulary-seal.mp3', firstLetterColor: 'text-cyan-600' }
            };

            const getCustomAudio = (word) => {
                const firstChar = word.charAt(0).toLowerCase();
                if (['h', 'e', 'l', 'c', 'w'].includes(firstChar)) {
                    const phonicName = (firstChar === 'w' && word.startsWith('w')) ? 'wh' : firstChar;
                    return {
                        phonicUrl: `https://raw.githubusercontent.com/JOUCHUCHEN/maachiiknow/main/Sound/${firstChar.toUpperCase()}/phonic-${phonicName}.mp3`,
                        wordUrl: `https://raw.githubusercontent.com/JOUCHUCHEN/maachiiknow/main/Sound/${firstChar.toUpperCase()}/vocabulary-${word.toLowerCase()}.mp3`
                    };
                }
                return null;
            };

            const showToast = (msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(""), 3000); };

            const generateGrammar = useCallback(() => {
                const num = vocabData.numbers[Math.floor(Math.random() * vocabData.numbers.length)];
                const adj = vocabData.adjectives[Math.floor(Math.random() * vocabData.adjectives.length)];
                const color = vocabData.colors[Math.floor(Math.random() * vocabData.colors.length)];
                const partObj = vocabData.parts[Math.floor(Math.random() * vocabData.parts.length)];
                setGrammarSentence({ num, adj, color, partWord: num === 1 ? partObj.s : partObj.p });
            }, []);
            useEffect(() => generateGrammar(), [generateGrammar]);

            const startNewGameRound = useCallback(() => {
                gameState.current.active = true;
                const beast = gameBeasts[Math.floor(Math.random() * gameBeasts.length)]; setTargetBeast(beast);
                const opts = [ { word: beast.feature, emoji: beast.featureEmoji, correct: true } ];
                const wrong = vocabData.parts.filter(p => p.p !== beast.feature).sort(() => 0.5 - Math.random()).slice(0, 2);
                wrong.forEach(w => opts.push({ word: w.p, emoji: w.emoji, correct: false }));
                setOptions(opts.sort(() => 0.5 - Math.random()));
                speakWithBackoff(`What does ${beast.name} have?`, setIsSpeaking);
            }, []);

            const onAIResults = (results) => {
                if (!gameState.current.active || !cursorRef.current) return;
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    const index = results.multiHandLandmarks[0][8]; const rect = document.getElementById('game-area').getBoundingClientRect();
                    const px = rect.left + (1 - index.x) * rect.width; const py = rect.top + index.y * rect.height;
                    cursorRef.current.style.display = 'flex'; cursorRef.current.style.left = px + 'px'; cursorRef.current.style.top = py + 'px';
                    const target = document.elementsFromPoint(px, py).find(el => el.closest('.game-card'))?.closest('.game-card');
                    if (target) {
                        if (hoverState.current.node !== target) { hoverState.current.node = target; hoverState.current.startTime = Date.now(); target.classList.add('hovered'); progressRef.current.style.display = 'block'; }
                        else if (Date.now() - hoverState.current.startTime > 1500) {
                            gameState.current.active = false;
                            if (target.dataset.correct === 'true') { target.classList.add('correct'); setGameScore(s => s + 10); speakWithBackoff("Correct!", setIsSpeaking); setTimeout(startNewGameRound, 2000); }
                            else { target.classList.add('wrong'); setTimeout(() => { target.classList.remove('wrong'); gameState.current.active = true; }, 1000); }
                        }
                    } else { if (hoverState.current.node) hoverState.current.node.classList.remove('hovered'); hoverState.current.node = null; progressRef.current.style.display = 'none'; }
                } else { cursorRef.current.style.display = 'none'; }
            };

            const initAIGame = async () => {
                try {
                    handsModelRef.current = new Hands({locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
                    handsModelRef.current.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
                    handsModelRef.current.onResults(onAIResults);
                    cameraRef.current = new Camera(videoRef.current, { onFrame: async () => await handsModelRef.current.send({image: videoRef.current}), width: 640, height: 480 });
                    await cameraRef.current.start(); setHasStartedGame(true); startNewGameRound();
                } catch (e) { showToast("Camera failed."); }
            };

            const tabs = [
                { id: 'animals', label: 'Animals' },
                { id: 'body_part', label: 'Parts' },
                { id: 'grammar', label: 'Grammar' },
                { id: 'game', label: 'AI Game' }
            ];

            return (
                <div className="flex flex-col h-screen overflow-hidden bg-indigo-50">
                    <nav className="bg-white shadow-sm h-14 border-b flex items-center justify-between px-6 shrink-0">
                        <div className="flex items-center gap-2 cursor-pointer" onClick={() => window.location.reload()}>
                            <img src="https://i.ibb.co/CFC5v9L/Machi-Know-Logo.png" alt="Logo" className="w-8 h-8" />
                            <span className="font-logo font-black text-xl">Maachii<span className="text-orange-600">Know</span></span>
                        </div>
                        <div className="flex bg-slate-100 p-1 rounded-xl gap-1">
                            {tabs.map((tab, idx) => (
                                <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`py-1.5 px-4 rounded-lg font-bold transition-all text-sm ${activeTab === tab.id ? 'active-tab' : 'text-slate-500 hover:bg-white'}`}>{tab.label}</button>
                            ))}
                        </div>
                    </nav>

                    <main className="flex-1 overflow-y-auto custom-scrollbar p-4 flex flex-col items-center">
                        {/* PART 1: ANIMALS */}
                        <section className={`${activeTab === 'animals' ? 'block' : 'hidden'} w-full max-w-6xl`}>
                            <div className="grid grid-cols-2 gap-4">
                                {baseAnimals.map(animal => {
                                    const custom = customAudioMap[animal.word];
                                    return (
                                        <div key={animal.word} className="bg-white rounded-[2rem] shadow-lg border border-indigo-50 overflow-hidden relative flex flex-col items-center p-4 h-[420px]">
                                            {/* 背景裝飾 */}
                                            <div className="absolute top-4 left-1/2 -translate-x-1/2 z-0 opacity-10 pointer-events-none select-none">
                                                {animal.icon ? <img src={animal.icon} className="w-56 h-56 object-contain" /> : <span className="text-[18rem]">{animal.emoji}</span>}
                                            </div>
                                            
                                            <div className="relative z-10 w-full flex flex-col items-center">
                                                <button onClick={() => custom ? playExternalAudio(custom.wordUrl, animal.word) : speakWithBackoff(animal.word, setIsSpeaking)} className="transition-transform hover:scale-105 active:scale-95 mb-4 flex items-center justify-center">
                                                    {animal.icon ? <img src={animal.icon} className="w-56 h-56 object-contain" /> : <span className="text-[14rem]">{animal.emoji}</span>}
                                                </button>
                                                <div className="bg-white/80 backdrop-blur-sm shadow-md px-6 py-2 rounded-full mb-8 border border-white">
                                                    <PhonicsWord word={animal.word} firstLetterColor={custom?.firstLetterColor || "text-sky-500"} restColor="text-indigo-800" phonicsUrl={custom?.phonicUrl} wordUrl={custom.wordUrl} setIsSpeaking={setIsSpeaking} />
                                                </div>
                                            </div>

                                            {/* 標籤 */}
                                            {animal.parts.map(p => {
                                                const partInfo = vocabData.parts.find(v => v.s === p.id || v.p === p.id) || { s: p.id, p: p.id };
                                                const partAudio = getCustomAudio(partInfo.s);
                                                const isPlural = ['ears', 'legs', 'claws', 'tusks', 'wings', 'horns', 'teeth', 'mouths', 'tongues', 'eyes', 'fins'].includes(p.id);
                                                const sentence = `A ${animal.word} has ${isPlural ? '' : 'a '}${isPlural ? partInfo.p : partInfo.s}.`;
                                                return (
                                                    <button key={p.id} onClick={() => { showToast(sentence); partAudio ? playExternalAudio(partAudio.wordUrl, sentence) : speakWithBackoff(sentence, setIsSpeaking); }} 
                                                        className="absolute bg-white/95 backdrop-blur shadow-xl border-2 border-indigo-100 px-6 py-2.5 rounded-full text-xl font-bold text-indigo-700 hover:bg-indigo-600 hover:text-white transition-all active:scale-90 z-20"
                                                        style={{ top: p.top, left: p.left }}
                                                    >
                                                        {partInfo.s}
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    );
                                })}
                            </div>
                        </section>

                        {/* PART 2: BODY PARTS */}
                        <section className={`${activeTab === 'body_part' ? 'block' : 'hidden'} w-full max-w-4xl space-y-6`}>
                            <div className="bg-white p-6 rounded-3xl shadow-md border-t-4 border-indigo-500">
                                <h3 className="text-xl font-bold text-indigo-700 mb-4">🐾 Body Parts</h3>
                                <div className="grid grid-cols-4 gap-3">
                                    {vocabData.parts.map(p => (
                                        <div key={p.s} className="vocab-card bg-indigo-50 p-4 rounded-2xl text-center border cursor-pointer" onClick={() => speakWithBackoff(p.s, setIsSpeaking)}>
                                            <span className="text-3xl mb-1 block">{p.emoji}</span>
                                            <span className="font-bold text-lg text-indigo-900">{p.s}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </section>

                        {/* PART 3: GRAMMAR */}
                        <section className={`${activeTab === 'grammar' ? 'block' : 'hidden'} w-full max-w-2xl`}>
                            <div className="bg-white p-8 rounded-3xl shadow-xl border-2 text-center">
                                <h3 className="text-indigo-400 font-bold uppercase tracking-widest mb-4 text-xs">Grammar Formula</h3>
                                {grammarSentence && (
                                    <p className="text-3xl font-bold text-indigo-900 leading-tight mb-8">
                                        It has <span className="text-pink-600">{grammarSentence.num}</span> <span className="text-amber-600">{grammarSentence.adj.word.toLowerCase()}</span> <span style={{color:grammarSentence.color.hex}}>{grammarSentence.color.word.toLowerCase()}</span> <span className="text-indigo-600">{grammarSentence.partWord.toLowerCase()}</span>.
                                    </p>
                                )}
                                <div className="flex justify-center gap-4">
                                    <button onClick={generateGrammar} className="bg-indigo-600 text-white px-8 py-3 rounded-full font-bold">🎲 Spin</button>
                                    <button onClick={() => speakWithBackoff(`It has ${grammarSentence.num} ${grammarSentence.adj.word} ${grammarSentence.color.word} ${grammarSentence.partWord}.`, setIsSpeaking)} className="bg-emerald-500 text-white px-8 py-3 rounded-full font-bold">🔊 Listen</button>
                                </div>
                            </div>
                        </section>

                        {/* PART 4: AI GAME */}
                        <section className={`${activeTab === 'game' ? 'block' : 'hidden'} w-full max-w-4xl`}>
                             <div className="bg-white p-4 rounded-[2rem] shadow-2xl relative overflow-hidden aspect-video bg-slate-100 flex items-center justify-center" id="game-area">
                                {!hasStartedGame ? (<button onClick={initAIGame} className="bg-indigo-600 text-white px-10 py-5 rounded-full font-bold text-2xl">Start Camera</button>) : (
                                    <>
                                        <video ref={videoRef} className="absolute inset-0 w-full h-full object-cover opacity-60 scale-x-[-1]" autoPlay playsInline></video>
                                        {targetBeast && (
                                            <div className="absolute inset-0 z-20 flex flex-col p-4">
                                                <div className="bg-white/90 backdrop-blur p-4 rounded-2xl shadow-xl flex items-center justify-center gap-6 max-w-md mx-auto w-full border border-indigo-100">
                                                    <span className="text-5xl">{targetBeast.isImage ? <img src={targetBeast.emoji} className="w-16 h-16" /> : targetBeast.emoji}</span>
                                                    <h4 className="text-2xl font-bold text-indigo-900">{targetBeast.name}</h4>
                                                </div>
                                                <div className="flex-1 flex items-center justify-center gap-6">
                                                    {options.map((opt, i) => (<div key={i} data-correct={opt.correct} className="game-card bg-white/95 rounded-2xl border-2 border-indigo-100 p-4 w-32 flex flex-col items-center justify-center shadow-lg"><span className="text-4xl mb-1">{opt.emoji}</span><span className="font-bold text-sm">{opt.word}</span></div>))}
                                                </div>
                                            </div>
                                        )}
                                    </>
                                )}
                            </div>
                        </section>
                    </main>

                    <div id="toast" className={`fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full shadow-2xl font-bold transition-opacity z-50 ${toastMsg ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}>{toastMsg}</div>
                    <div id="ai-cursor" ref={cursorRef} style={{display:'none'}}>👆<div className="hover-progress" ref={progressRef}></div></div>
                    {isSpeaking && (<div className="fixed bottom-6 right-6 bg-white p-3 rounded-xl shadow-xl border flex items-center gap-2 z-50"><div className="loading-ring !block"></div><span className="font-bold text-xs text-indigo-800 tracking-tight">Speaking...</span></div>)}
                </div>
            );
        }
        const root = createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
