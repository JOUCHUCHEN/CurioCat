        const apiKey = typeof __api_key !== 'undefined' ? __api_key : ""; 
        let currentAudio = null;
        let safeTimeoutId = null;
        const audioCache = {};
        const fetchPromises = {};

        const preloadAudio = async (url) => {
            if (audioCache[url]) return audioCache[url];
            if (fetchPromises[url]) return fetchPromises[url];
            fetchPromises[url] = fetch(url).then(res => res.ok ? res.blob() : Promise.reject())
                .then(blob => {
                    const audio = new Audio(URL.createObjectURL(new Blob([blob], { type: 'audio/mpeg' })));
                    audio.preload = 'auto'; audioCache[url] = audio; return audio;
                }).catch(() => { const audio = new Audio(url); audioCache[url] = audio; return audio; });
            return fetchPromises[url];
        };

        const playAudioFromPCM = (base64Data, sampleRate) => {
            return new Promise((resolve, reject) => {
                try {
                    if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
                    const binaryString = atob(base64Data); const len = binaryString.length;
                    const bytes = new Uint8Array(len); for (let i = 0; i < len; i++) bytes[i] = binaryString.charCodeAt(i);
                    const wavHeader = new ArrayBuffer(44); const view = new DataView(wavHeader);
                    view.setUint32(0, 0x52494646, false); view.setUint32(4, 36 + len, true);
                    view.setUint32(8, 0x57415645, false); view.setUint32(12, 0x666d7420, false); 
                    view.setUint16(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, 1, true); 
                    view.setUint32(24, sampleRate, true); view.setUint32(28, sampleRate * 2, true);
                    view.setUint16(32, 2, true); view.setUint16(34, 16, true);
                    view.setUint32(36, 0x64617461, false); view.setUint32(40, len, true);
                    currentAudio = new Audio(URL.createObjectURL(new Blob([wavHeader, bytes], { type: 'audio/wav' })));
                    currentAudio.playbackRate = 0.75; currentAudio.onended = resolve; currentAudio.onerror = reject;
                    currentAudio.play().catch(reject);
                } catch (e) { reject(e); }
            });
        };

        const speakText = async (text, setIsLoading) => {
            if (!text) return; if ('speechSynthesis' in window) window.speechSynthesis.cancel();
            if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
            if (setIsLoading) setIsLoading(true);
            const cleanup = () => { if (setIsLoading) setIsLoading(false); };
            if (safeTimeoutId) clearTimeout(safeTimeoutId); safeTimeoutId = setTimeout(cleanup, 5000);
            try {
                if (apiKey) {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: text }] }], generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } } } })
                    });
                    if (response.ok) {
                        const result = await response.json(); const pcmData = result.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
                        if (pcmData) {
                            const sampleRate = parseInt(result.candidates[0].content.parts[0].inlineData.mimeType.split('rate=')[1]) || 24000;
                            await playAudioFromPCM(pcmData, sampleRate); clearTimeout(safeTimeoutId); cleanup(); return;
                        }
                    }
                }
            } catch (error) {}
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text); utterance.lang = 'en-US'; utterance.rate = 0.75;
                utterance.onend = () => { clearTimeout(safeTimeoutId); cleanup(); }; utterance.onerror = cleanup;
                window.speechSynthesis.speak(utterance);
            } else { cleanup(); }
        };

        const playExternalAudio = async (url, fallbackText = null) => {
            if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
            if ('speechSynthesis' in window) window.speechSynthesis.cancel();
            try {
                let audio = audioCache[url] || await preloadAudio(url);
                currentAudio = audio; currentAudio.currentTime = 0; await currentAudio.play();
            } catch (e) { if (fallbackText) speakText(fallbackText); }
        };

            const cameraRef = useRef(null);

            const slideUrls = [ "https://i.ibb.co/bjYZjv5X/1.png", "https://i.ibb.co/709rzzP/2.png", "https://i.ibb.co/kk6JHQs/3.png", "https://i.ibb.co/CsHpG0yT/4.png", "https://i.ibb.co/7x2xZchn/5.png", "https://i.ibb.co/QvFRQmrD/6.png", "https://i.ibb.co/7JjSNRhj/7.png", "https://i.ibb.co/dd7mW1L/8.png", "https://i.ibb.co/ZR2X8G9s/9.png", "https://i.ibb.co/93T3Q2VX/10.png", "https://i.ibb.co/V0Jcj6bH/11.png", "https://i.ibb.co/60KnLN5q/12.png", "https://i.ibb.co/7dds53mq/13.png", "https://i.ibb.co/XkMBRkNx/14.png", "https://i.ibb.co/FbWxMw0k/15.png" ];

            const PhonicsWord = ({ word, firstLetterColor = "text-orange-500", restColor = "text-emerald-700", phonicsUrl = null, wordUrl = null, capitalize = false }) => {

                if (!gameState.current.active || !cursorRef.current) return;
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    const index = results.multiHandLandmarks[0][8]; const rect = document.getElementById('game-area').getBoundingClientRect();
                    const px = rect.left + (1 - index.x) * rect.width; const py = rect.top + index.y * rect.height;
                    cursorRef.current.style.display = 'flex'; cursorRef.current.style.left = px + 'px'; cursorRef.current.style.top = py + 'px';
                    const target = document.elementsFromPoint(px, py).find(el => el.closest('.game-card'))?.closest('.game-card');
                    if (target) {
                        if (hoverState.current.node !== target) { hoverState.current.node = target; hoverState.current.startTime = Date.now(); target.classList.add('hovered'); progressRef.current.style.display = 'block'; }
                        else if (Date.now() - hoverState.current.startTime > 1500) {
                            gameState.current.active = false;
                            if (target.dataset.correct === 'true') { target.classList.add('correct'); setGameScore(s => s + 10); speakText("Correct!", setIsSpeaking); setTimeout(startNewGameRound, 2000); }
                            else { target.classList.add('wrong'); setTimeout(() => { target.classList.remove('wrong'); gameState.current.active = true; }, 1000); }
                        }
                    } else { if (hoverState.current.node) hoverState.current.node.classList.remove('hovered'); hoverState.current.node = null; progressRef.current.style.display = 'none'; }
                } else { cursorRef.current.style.display = 'none'; }
            };

            const initAIGame = async () => {
                try {
                    handsModelRef.current = new Hands({locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
                    handsModelRef.current.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
                    handsModelRef.current.onResults(onAIResults);
                    cameraRef.current = new Camera(videoRef.current, { onFrame: async () => await handsModelRef.current.send({image: videoRef.current}), width: 640, height: 480 });
                    await cameraRef.current.start(); setHasStartedGame(true); startNewGameRound();
                } catch (e) { showToast("Camera failed."); }
            };

            return (
                <div className="flex flex-col h-screen overflow-hidden bg-indigo-50">
                    <nav className="bg-white shadow-sm h-20 border-b flex items-center justify-between px-8 shrink-0">
                        <div className="flex items-center gap-2 cursor-pointer" onClick={() => window.location.reload()}>
                            <img src="https://i.ibb.co/CFC5v9L/Machi-Know-Logo.png" alt="Logo" className="w-12 h-12" />
                            <span className="font-logo font-black text-2xl">Maachii<span className="text-orange-600">Know</span></span>
                        </div>
                        <div className="hidden md:flex gap-8 font-bold text-gray-500"><button className="hover:text-orange-600 transition-colors uppercase tracking-widest text-sm">Home</button></div>
                    </nav>

                    <main className="flex-1 overflow-y-auto custom-scrollbar">
                        <header className="bg-indigo-600 text-white py-6 text-center shadow-md">
                            <h1 className="text-2xl font-bold">🐾 Beast Body Parts 👁️</h1>
                        </header>

                        <div className="max-w-6xl mx-auto p-4">
                            <div className="flex flex-wrap justify-center mb-8 bg-white p-2 rounded-2xl shadow-md border gap-2">
                                {['animals', 'vocab', 'grammar', 'game', 'materials'].map((tab, idx) => (
                                    <button key={tab} onClick={() => setActiveTab(tab)} className={`flex-1 py-3 px-4 rounded-xl font-bold transition-all text-sm ${activeTab === tab ? 'active-tab' : 'text-slate-500 hover:bg-indigo-50'}`}>{idx+1}. {tab.charAt(0).toUpperCase() + tab.slice(1).replace('vocab', 'Body Parts')}</button>
                                ))}
                            </div>

                            {/* PART 1: ANIMALS - 改版：放大動物 + 標籤定位 */}
                            <section className={`${activeTab === 'animals' ? 'block' : 'hidden'} space-y-12 pb-20`}>
                                <div className="text-center"><h2 className="text-3xl font-bold text-indigo-900">Explore the Animals!</h2><p className="text-slate-500">Tap the body parts to listen 🔊</p></div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
                                    {baseAnimals.map(animal => {
                                        const custom = customAudioMap[animal.word];
                                        return (
                                            <div key={animal.word} className="bg-white rounded-[2.5rem] shadow-xl border-b-8 border-indigo-100 overflow-hidden relative flex flex-col items-center p-8 min-h-[450px]">
                                                <div className="absolute top-6 left-1/2 -translate-x-1/2 z-0 opacity-10 pointer-events-none text-[15rem] select-none">{animal.emoji}</div>
                                                <div className="relative z-10 w-full flex flex-col items-center">
                                                    <button onClick={() => custom ? playExternalAudio(custom.wordUrl, animal.word) : speakText(animal.word, setIsSpeaking)} className="text-[12rem] md:text-[14rem] transition-transform hover:scale-105 active:scale-95 mb-6 drop-shadow-2xl">{animal.emoji}</button>
                                                    <div className="bg-white/80 backdrop-blur shadow-sm border border-indigo-50 px-6 py-2 rounded-full mb-12"><PhonicsWord word={animal.word} firstLetterColor={custom?.firstLetterColor || "text-sky-500"} restColor="text-indigo-800" phonicsUrl={custom?.phonicUrl} wordUrl={custom.wordUrl} /></div>
                                                </div>
                                                {/* 部位標籤絕對定位於動物上方 */}
                                                {animal.parts.map(p => {
                                                    const partInfo = vocabData.parts.find(v => v.s === p.id || v.p === p.id) || { s: p.id, p: p.id };
                                                    const partAudio = getCustomAudio(partInfo.s);
                                                    const isPlural = ['ears', 'legs', 'claws', 'tusks', 'wings', 'horns', 'teeth'].includes(p.id);
                                                    const sentence = `A ${animal.word} has ${isPlural ? '' : 'a '}${isPlural ? partInfo.p : partInfo.s}.`;
                                                    
                                                    return (
                                                        <button key={p.id} onClick={() => { showToast(sentence); partAudio ? playExternalAudio(partAudio.wordUrl, sentence) : speakText(sentence, setIsSpeaking); }} 
                                                            className="absolute bg-white/90 backdrop-blur-md shadow-lg border-2 border-indigo-200 px-4 py-2 rounded-full text-sm font-bold text-indigo-700 hover:bg-indigo-600 hover:text-white transition-all active:scale-90 z-20 flex items-center gap-1.5"
                                                            style={{ top: p.top, left: p.left }}
                                                        >
                                                            <span>{partInfo.s}</span>
                                                        </button>
                                                    );
                                                })}
                                            </div>
                                        );
                                    })}
                                </div>
                            </section>

                            {/* PART 2: BODY PARTS */}
                            <section className={`${activeTab === 'vocab' ? 'block' : 'hidden'} space-y-10 pb-20`}>
                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                    <div className="bg-white p-6 rounded-3xl shadow-md border-t-4 border-indigo-500">
                                        <h3 className="text-xl font-bold text-indigo-700 mb-6 flex items-center gap-2">🐾 1. Body Parts</h3>
                                        <div className="grid grid-cols-2 sm:grid-cols-4 gap-4">
                                            {vocabData.parts.map(p => {
                                                const custom = getCustomAudio(p.s);
                                                return (
                                                    <div key={p.s} className="vocab-card bg-indigo-50 p-4 rounded-2xl text-center border border-indigo-100 cursor-pointer" onClick={() => custom ? playExternalAudio(custom.phonicUrl, p.s) : speakText(p.s, setIsSpeaking)}>
                                                        <span className="text-4xl mb-2 block">{p.emoji}</span>
                                                        <PhonicsWord word={p.s} phonicsUrl={custom?.phonicUrl} wordUrl={custom?.wordUrl} />
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                    <div className="bg-white p-6 rounded-3xl shadow-md border-t-4 border-pink-500">
                                        <h3 className="text-xl font-bold text-pink-700 mb-6 flex items-center gap-2">🔢 2. Numbers</h3>
                                        <div className="grid grid-cols-5 gap-3">
                                            {vocabData.numbers.map(n => (<button key={n} onClick={() => speakText(n.toString(), setIsSpeaking)} className="bg-pink-50 text-pink-700 font-bold p-3 rounded-xl border border-pink-100 hover:bg-pink-100">{n}</button>))}
                                        </div>
                                    </div>
                                    <div className="bg-white p-6 rounded-3xl shadow-md border-t-4 border-emerald-500">
                                        <h3 className="text-xl font-bold text-emerald-700 mb-6 flex items-center gap-2">🎨 3. Colors</h3>
                                        <div className="grid grid-cols-2 sm:grid-cols-4 gap-4">
                                            {vocabData.colors.map(c => (<button key={c.word} onClick={() => speakText(c.word, setIsSpeaking)} className="bg-slate-50 p-3 rounded-xl border flex flex-col items-center font-bold text-slate-700"><div className="w-8 h-8 rounded-full mb-1" style={{backgroundColor:c.hex}}></div>{c.word}</button>))}
                                        </div>
                                    </div>
                                    <div className="bg-white p-6 rounded-3xl shadow-md border-t-4 border-amber-500">
                                        <h3 className="text-xl font-bold text-amber-700 mb-6 flex items-center gap-2">📏 4. Features</h3>
                                        <div className="grid grid-cols-2 gap-4">
                                            {vocabData.adjectives.map(a => (<button key={a.word} onClick={() => speakText(a.word, setIsSpeaking)} className="bg-amber-50 p-4 rounded-xl border border-amber-100 font-bold text-amber-800 text-lg flex items-center justify-center gap-3">{a.icon} {a.word}</button>))}
                                        </div>
                                    </div>
                                </div>
                            </section>

                            {/* PART 3: GRAMMAR */}
                            <section className={`${activeTab === 'grammar' ? 'block' : 'hidden'} space-y-8 pb-20`}>
                                <div className="bg-white p-10 rounded-3xl shadow-xl max-w-3xl mx-auto border-2 text-center">
                                    <h3 className="text-indigo-400 font-bold uppercase tracking-widest mb-6 text-sm">Grammar Formula</h3>
                                    <div className="flex flex-wrap justify-center gap-2 text-lg font-bold mb-10"><span className="bg-slate-100 px-4 py-2 rounded-xl">It has</span><span className="bg-pink-100 text-pink-700 px-4 py-2 rounded-xl">Number</span><span className="bg-amber-100 text-amber-700 px-4 py-2 rounded-xl">Feature</span><span className="bg-emerald-100 text-emerald-700 px-4 py-2 rounded-xl">Color</span><span className="bg-indigo-100 text-indigo-700 px-4 py-2 rounded-xl">Part</span></div>
                                    {grammarSentence && (<p className="text-3xl md:text-4xl font-bold text-indigo-900 leading-tight mb-10">It has <span className="text-pink-600">{grammarSentence.num}</span> <span className="text-amber-600">{grammarSentence.adj.word.toLowerCase()}</span> <span style={{color:grammarSentence.color.hex}}>{grammarSentence.color.word.toLowerCase()}</span> <span className="text-indigo-600">{grammarSentence.partWord.toLowerCase()}</span>.</p>)}
                                    <div className="flex justify-center gap-4"><button onClick={generateGrammar} className="bg-indigo-600 text-white px-8 py-3 rounded-full font-bold">🎲 Spin</button><button onClick={() => speakText(`It has ${grammarSentence.num} ${grammarSentence.adj.word} ${grammarSentence.color.word} ${grammarSentence.partWord}.`, setIsSpeaking)} className="bg-emerald-500 text-white px-8 py-3 rounded-full font-bold">🔊 Listen</button></div>
                                </div>
                            </section>

                            {/* PART 4: AI GAME */}
                            <section className={`${activeTab === 'game' ? 'block' : 'hidden'} space-y-6 pb-20`}>
                                <div className="flex justify-center gap-4"><button onClick={() => setGameMode('challenge')} className={`px-6 py-3 rounded-full font-bold ${gameMode === 'challenge' ? 'bg-indigo-600 text-white' : 'bg-white text-indigo-500 border'}`}>🎯 AI Challenge</button><button onClick={() => { setGameMode('creator'); if(cameraRef.current) cameraRef.current.stop(); setHasStartedGame(false); }} className={`px-6 py-3 rounded-full font-bold ${gameMode === 'creator' ? 'bg-pink-600 text-white' : 'bg-white text-pink-500 border'}`}>🎨 Beast Creator</button></div>
                                {gameMode === 'challenge' && (
                                    <div className="max-w-5xl mx-auto space-y-6">
                                        <div className="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm"><div><h3 className="text-2xl font-bold text-indigo-900">AI Beast Master</h3><p className="text-slate-400">Point at the correct feature!</p></div><div className="bg-yellow-100 border-2 border-yellow-400 px-6 py-2 rounded-full font-bold text-2xl">Score: {gameScore}</div></div>
                                        <div className="bg-white p-4 rounded-[2rem] shadow-2xl relative overflow-hidden aspect-video bg-slate-100 flex items-center justify-center" id="game-area">
                                            {!hasStartedGame ? (<button onClick={initAIGame} className="bg-indigo-600 text-white px-10 py-5 rounded-full font-bold text-2xl shadow-xl hover:scale-105 transition-all">Start Camera & Play</button>) : (
                                                <>
                                                    <video ref={videoRef} className="absolute inset-0 w-full h-full object-cover opacity-60 scale-x-[-1]" autoPlay playsInline></video>
                                                    {targetBeast && (
                                                        <div className="absolute inset-0 z-20 flex flex-col p-8">
                                                            <div className="bg-white/90 backdrop-blur p-6 rounded-3xl shadow-xl flex items-center justify-center gap-6 max-w-xl mx-auto w-full border-2 border-indigo-100">
                                                                <span className="text-7xl animate-bounce">{targetBeast.emoji}</span><div className="text-left"><p className="text-sm font-bold text-slate-500 uppercase">Find the part for:</p><h4 className="text-3xl font-bold text-indigo-900">{targetBeast.name}</h4></div>
                                                            </div>
                                                            <div className="flex-1 flex items-center justify-center gap-8 mt-6">
                                                                {options.map((opt, i) => (<div key={i} data-correct={opt.correct} className="game-card bg-white/95 rounded-[2rem] border-4 border-indigo-100 p-6 w-40 flex flex-col items-center justify-center shadow-lg"><span className="text-6xl mb-2">{opt.emoji}</span><span className="font-bold text-slate-800 text-lg">{opt.word}</span></div>))}
                                                            </div>
                                                        </div>
                                                    )}
                                                </>
                                            )}
                                        </div>
                                    </div>
                                )}
                                {gameMode === 'creator' && (
                                    <div className="bg-white p-8 rounded-[2.5rem] shadow-xl border border-pink-100 max-w-5xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-10">
                                        <div className="space-y-6">
                                            <h3 className="text-2xl font-bold text-pink-700">Create a Magical Beast</h3>
                                            <div className="space-y-4">
                                                <div><p className="text-xs font-bold text-slate-400 mb-2">Base Animal</p><div className="flex flex-wrap gap-2">{creatorBaseAnimals.map(a => (<button key={a.word} onClick={() => setCreatorBase(a.word)} className={`px-4 py-2 rounded-xl border-2 font-bold ${creatorBase === a.word ? 'border-pink-500 bg-pink-50 text-pink-700' : 'border-slate-100'}`}>{a.emoji} {a.word}</button>))}</div></div>
                                                <div><p className="text-xs font-bold text-slate-400 mb-2">Color</p><div className="flex flex-wrap gap-2">{vocabData.colors.map(c => (<button key={c.word} onClick={() => setCreatorColor(c.word)} className={`px-3 py-2 rounded-xl border-2 font-bold ${creatorColor === c.word ? 'border-pink-500 bg-pink-50 text-pink-700' : 'border-slate-100'}`}><div className="w-3 h-3 rounded-full" style={{backgroundColor:c.hex}}></div> {c.word}</button>))}</div></div>
                                                <div><p className="text-xs font-bold text-slate-400 mb-2">Special Feature</p><div className="flex flex-wrap gap-2">{vocabData.parts.slice(3).map(p => (<button key={p.p} onClick={() => setCreatorPart(p.p)} className={`px-4 py-2 rounded-xl border-2 font-bold ${creatorPart === p.p ? 'border-pink-500 bg-pink-50 text-pink-700' : 'border-slate-100'}`}>{p.emoji} {p.p}</button>))}</div></div>
                                                <button onClick={handleGenerateBeast} disabled={isGeneratingImage} className="w-full bg-pink-600 text-white py-4 rounded-2xl font-bold text-lg shadow-lg hover:bg-pink-700 disabled:opacity-50">{isGeneratingImage ? "Magic in progress..." : "Generate AI Beast! 🚀"}</button>
                                            </div>
                                        </div>
                                        <div className="bg-slate-50 rounded-[2rem] border-4 border-dashed border-pink-100 flex flex-col items-center justify-center p-6 text-center">
                                            {generatedImage ? (<div className="w-full"><img src={generatedImage} alt="Beast" className="w-full rounded-2xl mb-4 shadow-xl" /><p className="text-xl font-bold text-indigo-900">A {creatorColor} {creatorBase.toLowerCase()} with {creatorPart}!</p></div>) : (<div className="text-slate-300 font-bold text-xl"><span className="text-6xl mb-4 block">🔮</span>Ready to see your creation?</div>)}
                                        </div>
                                    </div>
                                )}
                            </section>

                            {/* PART 5: MATERIALS */}
                            <section className={`${activeTab === 'materials' ? 'block' : 'hidden'} space-y-10 pb-20`}>
                                <div className="flex flex-col lg:flex-row gap-10 max-w-5xl mx-auto">
                                    <div className="lg:w-2/3 bg-white p-6 rounded-3xl shadow-xl border"><div className="flex justify-between items-center mb-4"><h3 className="font-bold flex items-center gap-2"><MonitorPlay className="text-indigo-500" /> Slide Preview</h3><span className="text-xs font-bold bg-indigo-50 text-indigo-600 px-3 py-1 rounded-full">{slideIndex+1} / {slideUrls.length}</span></div><div className="aspect-video bg-slate-900 rounded-xl overflow-hidden relative group"><img src={slideUrls[slideIndex]} className="w-full h-full object-contain" /><button onClick={() => setSlideIndex(p => (p-1+slideUrls.length)%slideUrls.length)} className="absolute left-2 top-1/2 -translate-y-1/2 bg-white/50 p-2 rounded-full hidden group-hover:block"><ChevronLeft/></button><button onClick={() => setSlideIndex(p => (p+1)%slideUrls.length)} className="absolute right-2 top-1/2 -translate-y-1/2 bg-white/50 p-2 rounded-full hidden group-hover:block"><ChevronRight/></button></div></div>
                                    <div className="lg:w-1/3 flex flex-col gap-4">
                                        <button className="bg-indigo-600 text-white p-6 rounded-3xl font-bold flex flex-col items-center gap-2 shadow-lg"><Download size={32}/> Download PPTX</button>
                                        <button className="bg-rose-500 text-white p-6 rounded-3xl font-bold flex flex-col items-center gap-2 shadow-lg"><FileText size={32}/> Download PDF</button>
                                        <button className="bg-emerald-500 text-white p-6 rounded-3xl font-bold flex flex-col items-center gap-2 shadow-lg"><FileImage size={32}/> Flashcards</button>
                                    </div>
                                </div>
                            </section>
                        </div>

                        <div id="toast" className={`fixed top-24 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-8 py-4 rounded-full shadow-2xl font-bold transition-opacity ${toastMsg ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}>{toastMsg}</div>
                        <div id="ai-cursor" ref={cursorRef} style={{display:'none'}}>👆<div className="hover-progress" ref={progressRef}></div></div>
                        {isSpeaking && (<div className="fixed bottom-6 right-6 bg-white p-4 rounded-full shadow-2xl border flex items-center gap-2 z-50"><div className="loading-ring !block"></div><span className="font-bold text-indigo-800">Speaking...</span></div>)}
                    </main>
                    <footer className="bg-white/80 py-4 text-center shrink-0 border-t"><p className="text-[10px] text-gray-400 font-black tracking-widest uppercase">© 2026 MaachiiKnow. All rights reserved.</p></footer>
                </div>
            );
        }
        const root = createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
