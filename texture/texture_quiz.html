<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Texture Quiz - MaachiiKnow</title>
    
    <!-- 引入 Noto Sans TC (Logo使用) 與 Roboto (全站使用) 字體 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Roboto', 'sans-serif'],
                        logo: ['"Noto Sans TC"', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- UI 所需的自訂 CSS -->
    <style>
        body { font-family: 'Roboto', sans-serif; margin: 0; padding: 0; }
        .custom-scroll::-webkit-scrollbar { width: 8px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f0f9ff; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #bae6fd; border-radius: 20px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #7dd3fc; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; } 
        .no-scrollbar::-webkit-scrollbar { display: none; } 
        @keyframes bounce-slow { 
          0%, 100% { transform: translateY(-5%); } 
          50% { transform: translateY(0); } 
        }
        .animate-bounce-slow { animation: bounce-slow 3s infinite; }
        @keyframes zoom-in {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-in {
            animation: zoom-in 0.3s ease-out forwards;
        }
    </style>

    <!-- Import Maps -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0"
        }
    }
    </script>

    <!-- Babel Standalone -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-sky-50 h-screen overflow-hidden">
    <div id="root" class="h-full"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        // 替換 BrainCircuit 為 Gamepad2
        import { Gamepad2, ArrowLeft, Menu, X, Star, CheckCircle2, XCircle, Volume2 } from 'lucide-react';

        const TEXTURES = [
          { id: 'scales', name: 'Scales', color: 'bg-emerald-100', borderColor: 'border-emerald-400', textColor: 'text-emerald-700', icon: '🐍' },
          { id: 'feathers', name: 'Feathers', color: 'bg-rose-100', borderColor: 'border-rose-400', textColor: 'text-rose-700', icon: '🐦' },
          { id: 'fur', name: 'Fur', color: 'bg-amber-100', borderColor: 'border-amber-400', textColor: 'text-amber-700', icon: '🦁' },
          { id: 'skin', name: 'Skin', color: 'bg-cyan-100', borderColor: 'border-cyan-400', textColor: 'text-cyan-700', icon: '🐘' }
        ];

        const ANIMALS = [
          { id: 'snake', name: 'Snake', texture: 'scales', emoji: '🐍' }, 
          { id: 'fish', name: 'Fish', texture: 'scales', emoji: '🐟' }, 
          { id: 'crocodile', name: 'Crocodile', texture: 'scales', emoji: '🐊' },
          { id: 'lizard', name: 'Lizard', texture: 'scales', emoji: '🦎' },
          { id: 'eagle', name: 'Eagle', texture: 'feathers', emoji: '🦅' }, 
          { id: 'crow', name: 'Crow', texture: 'feathers', emoji: '🐦‍⬛' }, 
          { id: 'parrot', name: 'Parrot', texture: 'feathers', emoji: '🦜' },
          { id: 'owl', name: 'Owl', texture: 'feathers', emoji: '🦉' },
          { id: 'dog', name: 'Dog', texture: 'fur', emoji: '🐶' }, 
          { id: 'lion', name: 'Lion', texture: 'fur', emoji: '🦁' }, 
          { id: 'horse', name: 'Horse', texture: 'fur', emoji: '🐴' },
          { id: 'panda', name: 'Panda', texture: 'fur', emoji: '🐼' },
          { id: 'whale', name: 'Whale', texture: 'skin', emoji: '🐳' }, 
          { id: 'dolphin', name: 'Dolphin', texture: 'skin', emoji: '🐬' }, 
          { id: 'frog', name: 'Frog', texture: 'skin', emoji: '🐸' },
          { id: 'elephant', name: 'Elephant', texture: 'skin', emoji: '🐘' }
        ];

        const playSound = (type) => {
          const soundUrl = type === 'correct' 
            ? 'https://raw.githubusercontent.com/JOUCHUCHEN/maachiiknow/main/animals/correct.mp3' 
            : 'https://raw.githubusercontent.com/JOUCHUCHEN/maachiiknow/main/animals/error.mp3';
          const audio = new Audio(soundUrl);
          audio.volume = 0.5;
          audio.play().catch(() => {});
        };

        const speak = (text) => {
          if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.8;
            window.speechSynthesis.speak(utterance);
          }
        };

        function App() {
          const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
          const [quizAnimal, setQuizAnimal] = useState(null);
          const [quizScore, setQuizScore] = useState(0);
          const [quizFeedback, setQuizFeedback] = useState(null);
          const [quizStreak, setQuizStreak] = useState(0);
          const [hasStarted, setHasStarted] = useState(false); // 新增狀態：判斷是否已點擊開始

          const resetQuiz = () => {
            const random = ANIMALS[Math.floor(Math.random() * ANIMALS.length)];
            setQuizAnimal(random);
            // 移除原本的 0.5 秒延遲，立刻播放發音
            speak(`What does a ${random.name} have?`);
          };

          const handleQuizGuess = (textureId) => {
            if (quizFeedback) return;
            const selectedTexture = TEXTURES.find(t => t.id === textureId);
            
            if (textureId === quizAnimal.texture) {
              // 答對邏輯
              playSound('correct');
              setQuizFeedback('correct');
              setQuizScore(s => s + 10);
              setQuizStreak(s => s + 1);
              
              // 延遲 0.5 秒後播放人聲
              setTimeout(() => {
                  speak(`It has ${selectedTexture.name}`);
              }, 500);
              
              // 等待 2.5 秒後重置進入下一題 (確保語音播完)
              setTimeout(() => { setQuizFeedback(null); resetQuiz(); }, 2500);
            } else {
              // 答錯邏輯
              playSound('wrong');
              setQuizFeedback('wrong');
              setQuizStreak(0);
              // 移除了 speak('Oops! Try again.');
              
              setTimeout(() => setQuizFeedback(null), 1200);
            }
          };

          // 導航至首頁
          const navigateToHome = () => {
            window.location.href = '/index.html';
          };

          // 導航至質地介紹頁
          const navigateToEnglishTexture = () => {
            window.location.href = '/english_texture.html';
          };

          // --- Navbar Component 嚴格按照樣板 ---
          const Navbar = () => (
            <nav className="bg-white shadow-sm h-20 border-b flex-shrink-0 z-50 sticky top-0">
              <div className="max-w-7xl mx-auto px-4 h-full flex justify-between items-center">
                {/* Logo 點擊回到網站根目錄 */}
                <div className="flex items-center cursor-pointer group" onClick={navigateToHome}>
                  <img 
                      src="https://i.ibb.co/CFC5v9L/Machi-Know-Logo.png" 
                      alt="Maachiiknow Logo" 
                      className="w-16 h-16 object-contain group-hover:scale-110 group-hover:rotate-6 transition-all relative -top-1 left-0 z-0"
                   />
                   <span className="font-logo font-black text-3xl text-gray-900 tracking-tighter relative z-10 ml-0">
                     Maachii<span className="text-orange-600">Know</span>
                   </span>
                </div>
                
                <div className="hidden md:flex items-center space-x-12">
                  <button 
                    onClick={navigateToHome} 
                    className="font-bold text-base text-gray-500 hover:text-orange-600 uppercase tracking-widest transition-colors"
                  >
                    Home
                  </button>
                </div>

                <button 
                  onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} 
                  className="md:hidden text-gray-600 p-2"
                >
                  {isMobileMenuOpen ? <X size={28} /> : <Menu size={28} />}
                </button>
              </div>
              
              {isMobileMenuOpen && (
                <div className="absolute top-20 left-0 w-full bg-white shadow-xl border-b md:hidden flex flex-col p-6 space-y-4 z-40 animate-in slide-in-from-top-2 duration-300">
                  <button 
                    onClick={navigateToHome} 
                    className="text-left font-bold text-gray-700"
                  >
                    Home
                  </button>
                </div>
              )}
            </nav>
          );

          return (
            <div className="flex flex-col h-screen overflow-hidden bg-sky-50 min-h-screen">
                
                <Navbar />

                {/* Main Content Area */}
                <main className="flex-1 flex flex-col p-2 sm:p-4 min-h-0 overflow-y-auto overflow-x-hidden relative custom-scroll">
                  <div className="max-w-7xl mx-auto w-full h-full flex flex-col min-h-0">
                    
                    {/* Header & Content Back Button */}
                    <div className="flex items-center justify-between mb-2 sm:mb-4 bg-white p-3 rounded-3xl shadow-sm border border-sky-100 shrink-0">
                      <button 
                        onClick={navigateToEnglishTexture} 
                        className="p-3 text-orange-600 hover:bg-orange-50 rounded-2xl transition-all shadow-sm active:scale-90"
                      >
                        <ArrowLeft size={28} />
                      </button>
                      <h2 className="text-2xl sm:text-3xl font-black text-slate-800 flex items-center gap-3">
                        {/* 更換圖標為 Gamepad2 */}
                        <Gamepad2 className="text-emerald-500" /> Texture Quiz
                      </h2>
                      <div className="flex items-center gap-2 pr-2">
                        <div className="flex items-center gap-1 text-amber-500 font-black text-xl sm:text-2xl">
                          <Star className="fill-amber-500" size={24} /> {quizScore}
                        </div>
                      </div>
                    </div>

                    {/* 透過 hasStarted 狀態來控制是否顯示測驗畫面，以確保符合瀏覽器自動播放語音規則 */}
                    {!hasStarted ? (
                      <div className="bg-white rounded-[2rem] sm:rounded-[3.5rem] p-4 sm:p-6 border-2 sm:border-4 border-sky-100 shadow-xl relative flex-1 flex flex-col items-center justify-center gap-6 min-h-0 animate-in overflow-hidden w-full max-w-5xl mx-auto">
                        <div className="text-[6rem] sm:text-[8rem] animate-bounce-slow">🐾</div>
                        <h2 className="text-3xl sm:text-5xl font-black text-slate-800 tracking-tighter text-center">Ready to Play?</h2>
                        <button 
                          onClick={() => { setHasStarted(true); resetQuiz(); }} 
                          className="mt-2 px-10 py-4 bg-orange-500 hover:bg-orange-600 text-white text-2xl sm:text-3xl font-black rounded-full shadow-lg hover:shadow-xl hover:scale-105 active:scale-95 transition-all"
                        >
                          Start Quiz
                        </button>
                      </div>
                    ) : (
                      /* Quiz Logic Area (The "White Card") */
                      <div className="bg-white rounded-[2rem] sm:rounded-[3.5rem] p-4 sm:p-6 border-2 sm:border-4 border-sky-100 shadow-xl relative flex-1 flex flex-col items-center justify-center gap-2 sm:gap-4 min-h-0 animate-in overflow-hidden w-full max-w-5xl mx-auto">
                        
                        {/* Feedback Overlays */}
                        {quizFeedback === 'correct' && (
                          <div className="absolute inset-0 bg-emerald-500/95 z-20 flex flex-col items-center justify-center text-white animate-in px-4 text-center">
                            <CheckCircle2 size={64} className="mb-2 sm:mb-4 animate-bounce" />
                            <h2 className="text-2xl sm:text-4xl font-black uppercase tracking-tighter">It has {TEXTURES.find(t => t.id === quizAnimal.texture)?.name}!</h2>
                          </div>
                        )}
                        {quizFeedback === 'wrong' && (
                          <div className="absolute inset-0 bg-rose-500/95 z-20 flex flex-col items-center justify-center text-white animate-in">
                            <XCircle size={64} className="mb-2 sm:mb-4" />
                            <h2 className="text-2xl sm:text-4xl font-black uppercase tracking-tighter">Try Again!</h2>
                          </div>
                        )}

                        {/* Question Section */}
                        <h3 className="text-xl sm:text-3xl font-black text-gray-800 flex items-center gap-2 sm:gap-3 justify-center text-center px-2 shrink-0 relative z-10">
                          What does a <span className="text-orange-600 underline decoration-sky-200 underline-offset-4 sm:underline-offset-8">{quizAnimal?.name?.toLowerCase()}</span> have?
                          <button onClick={() => speak(`What does a ${quizAnimal?.name} have?`)} className="p-2 sm:p-3 bg-sky-50 text-sky-500 rounded-full hover:bg-sky-100 transition-all shrink-0">
                            <Volume2 size={24} />
                          </button>
                        </h3>

                        {/* Hero Image Area */}
                        <div className="flex-1 flex items-center justify-center w-full min-h-0 relative z-10">
                          <div 
                            className="drop-shadow-2xl hover:scale-105 transition-transform cursor-pointer select-none leading-none flex items-center justify-center"
                            style={{ fontSize: 'clamp(4rem, 16vh, 12rem)' }}
                          >
                              {quizAnimal?.emoji}
                          </div>
                        </div>

                        {/* Options Grid */}
                        <div className="grid grid-cols-2 lg:grid-cols-4 gap-2 sm:gap-4 w-full max-w-4xl shrink-0 relative z-10">
                          {TEXTURES.map(t => (
                            <button 
                              key={t.id} 
                              onClick={() => handleQuizGuess(t.id)} 
                              disabled={!!quizFeedback}
                              className={`${t.color} ${t.borderColor} border-b-4 sm:border-b-6 ${!quizFeedback ? 'hover:border-b-0 hover:translate-y-1' : 'opacity-40'} p-3 sm:p-5 rounded-2xl sm:rounded-[2rem] transition-all flex flex-col items-center justify-center gap-1 sm:gap-2 active:scale-95 group`}
                            >
                              <span className="text-3xl sm:text-4xl group-hover:scale-110 transition-transform leading-none">{t.icon}</span>
                              <span className={`text-base sm:text-xl font-black ${t.textColor} leading-tight`}>{t.name}</span>
                            </button>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                </main>

                {/* Footer Component 嚴格按照樣板 */}
                <footer className="bg-white/80 backdrop-blur-sm border-t py-4 text-center shrink-0">
                  <p className="text-[10px] text-gray-400 font-black uppercase tracking-[0.3em]">
                    © 2026 MaachiiKnow. All rights reserved.
                  </p>
                </footer>
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
