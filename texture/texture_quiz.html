<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Texture Quiz - MaachiiKnow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@900&family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .font-sans { font-family: 'Roboto', sans-serif; }
        .font-logo { font-family: 'Noto Sans TC', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .custom-scroll::-webkit-scrollbar { width: 8px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f0f9ff; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #bae6fd; border-radius: 20px; }
    </style>
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0"
        }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-sky-50 h-screen overflow-hidden font-sans">
    <div id="root" class="h-full"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { ArrowLeft, Menu, X, Star, CheckCircle2, XCircle, Volume2 } from 'lucide-react';

        const TEXTURES = [
          { id: 'scales', name: 'Scales', color: 'bg-emerald-100', borderColor: 'border-emerald-400', textColor: 'text-emerald-700', icon: '🐍' },
          { id: 'feathers', name: 'Feathers', color: 'bg-rose-100', borderColor: 'border-rose-400', textColor: 'text-rose-700', icon: '🐦' },
          { id: 'fur', name: 'Fur', color: 'bg-amber-100', borderColor: 'border-amber-400', textColor: 'text-amber-700', icon: '🦁' },
          { id: 'smooth', name: 'Smooth Skin', color: 'bg-cyan-100', borderColor: 'border-cyan-400', textColor: 'text-cyan-700', icon: '🐬' }
        ];

        const ANIMALS = [
          { id: 'snake', name: 'Snake', texture: 'scales', emoji: '🐍' }, { id: 'fish', name: 'Fish', texture: 'scales', emoji: '🐟' }, { id: 'crocodile', name: 'Crocodile', texture: 'scales', emoji: '🐊' },
          { id: 'eagle', name: 'Eagle', texture: 'feathers', emoji: '🦅' }, { id: 'crow', name: 'Crow', texture: 'feathers', emoji: '🐦‍⬛' }, { id: 'parrot', name: 'Parrot', texture: 'feathers', emoji: '🦜' },
          { id: 'dog', name: 'Dog', texture: 'fur', emoji: '🐶' }, { id: 'lion', name: 'Lion', texture: 'fur', emoji: '🦁' }, { id: 'horse', name: 'Horse', texture: 'fur', emoji: '🐴' },
          { id: 'whale', name: 'Whale', texture: 'smooth', emoji: '🐳' }, { id: 'seal', name: 'Seal', texture: 'smooth', emoji: '🦭' }, { id: 'elephant', name: 'Elephant', texture: 'smooth', emoji: '🐘' }
        ];

        const speak = (text) => {
          if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.8;
            window.speechSynthesis.speak(utterance);
          }
        };

        function App() {
          const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
          const [quizAnimal, setQuizAnimal] = useState(null);
          const [quizScore, setQuizScore] = useState(0);
          const [quizFeedback, setQuizFeedback] = useState(null);
          const [quizStreak, setQuizStreak] = useState(0);

          useEffect(() => { resetQuiz(); }, []);

          const resetQuiz = () => {
            const random = ANIMALS[Math.floor(Math.random() * ANIMALS.length)];
            setQuizAnimal(random);
            speak(`What does a ${random.name} have?`);
          };

          const handleQuizGuess = (textureId) => {
            if (textureId === quizAnimal.texture) {
              setQuizFeedback('correct');
              setQuizScore(s => s + 10);
              setQuizStreak(s => s + 1);
              speak('Great job!');
              setTimeout(() => { setQuizFeedback(null); resetQuiz(); }, 1500);
            } else {
              setQuizFeedback('wrong');
              setQuizStreak(0);
              speak('Oops! Try again.');
              setTimeout(() => setQuizFeedback(null), 1200);
            }
          };

          return (
            <div className="flex flex-col h-full">
              <nav className="bg-white shadow-sm h-20 border-b shrink-0 z-50 sticky top-0">
                <div className="max-w-7xl mx-auto px-4 h-full flex justify-between items-center">
                  <div className="flex items-center cursor-pointer group" onClick={() => window.location.href='index.html'}>
                    <img src="https://i.ibb.co/CFC5v9L/Machi-Know-Logo.png" alt="Logo" className="w-16 h-16 group-hover:rotate-6 transition-all" />
                    <span className="font-logo font-black text-3xl text-gray-900 tracking-tighter">Maachii<span className="text-orange-600">Know</span></span>
                  </div>
                  <button onClick={() => window.location.href='index.html'} className="hidden md:block font-bold text-gray-500 hover:text-orange-600 tracking-widest uppercase transition-colors">Home</button>
                  <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="md:hidden text-gray-600 p-2">{isMobileMenuOpen ? <X size={28} /> : <Menu size={28} />}</button>
                </div>
              </nav>

              <main className="flex-1 overflow-y-auto relative custom-scroll p-4 md:p-6">
                <div className="max-w-7xl mx-auto h-full flex flex-col animate-in zoom-in">
                  <div className="flex items-center justify-between mb-6 bg-white p-4 rounded-3xl shadow-sm border">
                    <button onClick={() => window.location.href='index.html'} className="flex items-center gap-2 text-slate-500 hover:text-orange-600 font-bold px-4 py-2 rounded-xl transition-all"><ArrowLeft size={24} /> Quit</button>
                    <div className="flex items-center gap-4">
                      <div className="flex items-center gap-1 text-amber-500 font-black text-2xl"><Star className="fill-amber-500" /> {quizScore}</div>
                      {quizStreak > 2 && <div className="bg-rose-100 text-rose-500 px-3 py-1 rounded-full text-xs font-black animate-pulse uppercase tracking-widest">🔥 {quizStreak} Streak</div>}
                    </div>
                  </div>

                  <div className="bg-white rounded-[3.5rem] p-12 shadow-xl border border-sky-50 text-center relative flex-1 flex flex-col items-center justify-center">
                    {quizFeedback === 'correct' && (
                      <div className="absolute inset-0 bg-emerald-500/90 rounded-[3.5rem] z-20 flex flex-col items-center justify-center text-white animate-in zoom-in">
                        <CheckCircle2 size={100} className="mb-4 animate-bounce" />
                        <h2 className="text-5xl font-black tracking-tighter uppercase">Great Job!</h2>
                      </div>
                    )}
                    {quizFeedback === 'wrong' && (
                      <div className="absolute inset-0 bg-rose-500/90 rounded-[3.5rem] z-20 flex flex-col items-center justify-center text-white animate-in zoom-in">
                        <XCircle size={100} className="mb-4" />
                        <h2 className="text-5xl font-black tracking-tighter uppercase">Try Again!</h2>
                      </div>
                    )}

                    <h3 className="text-3xl sm:text-4xl font-black text-gray-800 mb-8 flex items-center gap-4 justify-center">
                      What does a {quizAnimal?.name} have?
                      <button onClick={() => speak(`What does a ${quizAnimal?.name} have?`)} className="p-3 bg-sky-50 text-sky-500 rounded-full active:scale-90"><Volume2 /></button>
                    </h3>

                    <div className="text-[10rem] sm:text-[12rem] mb-12 drop-shadow-2xl">{quizAnimal?.emoji}</div>

                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4 w-full max-w-4xl">
                      {TEXTURES.map(t => (
                        <button key={t.id} onClick={() => handleQuizGuess(t.id)} className={`${t.color} ${t.borderColor} border-b-8 hover:border-b-0 hover:translate-y-2 p-6 rounded-[2rem] transition-all flex flex-col items-center gap-2 active:scale-95`}>
                          <span className="text-4xl">{t.icon}</span><span className={`text-xl font-black ${t.textColor}`}>{t.name}</span>
                        </button>
                      ))}
                    </div>
                  </div>
                </div>
              </main>
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
